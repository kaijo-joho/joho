    function getClassLessons(classId, dayKey, period) {
      return derivedData.classTimetables?.[classId]?.[dayKey]?.[period] ?? [];
    }

    function renderClassList() {
      elements.classSelect.innerHTML = CLASS_IDS.map((classId) => (
        `<option value="${escapeHtml(classId)}" ${classId === selectedClassId ? "selected" : ""}>${escapeHtml(classId)}</option>`
      )).join("");

      elements.classList.innerHTML = Array.from({ length: 6 }, (_, gradeIndex) => {
        const grade = gradeIndex + 1;
        const classIds = CLASS_IDS.filter((classId) => classId.startsWith(`${grade}-`));
        return `
          <section class="class-grade-group" aria-labelledby="class-grade-${grade}">
            <h3 class="class-grade-title" id="class-grade-${grade}">${grade}年</h3>
            <div class="class-grade-grid">
              ${classIds.map((classId) => `
                <button class="class-option ${classId === selectedClassId ? "is-selected" : ""}" type="button" data-class-select-id="${escapeHtml(classId)}">
                  ${escapeHtml(classId)}
                </button>
              `).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    function renderClassScheduleCell(classId, dayKey, period) {
      const lessons = getClassLessons(classId, dayKey, period);
      const target = isTargetPeriod(dayKey, period);
      if (!lessons.length) {
        return `
          <div${classAttribute(["schedule-cell", "class-schedule-cell", target ? "is-target" : ""])} data-status="unregistered">
            <div class="cell-state" data-status="none">未登録</div>
          </div>
        `;
      }

      return `
        <div${classAttribute(["schedule-cell", "class-schedule-cell", target ? "is-target" : ""])} data-status="busy">
          ${lessons.map((lesson, index) => `
            <button class="class-lesson-card" type="button" data-class-lesson-class="${escapeHtml(classId)}" data-class-lesson-day="${escapeHtml(dayKey)}" data-class-lesson-period="${escapeHtml(period)}" data-class-lesson-index="${escapeHtml(index)}">
              <span class="cell-text">${escapeHtml(lesson.subject)}</span>
              ${lesson.teachers.length ? `<span class="class-teachers">担当: ${escapeHtml(lesson.teachers.map((teacher) => teacher.name).join(" / "))}</span>` : ""}
              ${lesson.targetLabel ? `<span class="class-target">対象: ${escapeHtml(lesson.targetLabel)}</span>` : ""}
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderClassDetail() {
      if (!selectedClassLesson) {
        return `
          <section class="class-detail">
            <h3>授業詳細</h3>
            <div class="compact-note">授業セルをクリックすると担当教員を表示します。</div>
          </section>
        `;
      }

      const { classId, dayKey, period, lessonIndex } = selectedClassLesson;
      const lesson = getClassLessons(classId, dayKey, period)[lessonIndex];
      const day = DAY_BY_KEY[dayKey];
      if (!lesson || !day) {
        return `
          <section class="class-detail">
            <h3>授業詳細</h3>
            <div class="compact-note">授業情報を表示できません。</div>
          </section>
        `;
      }

      return `
        <section class="class-detail">
          <h3>${escapeHtml(classId)} ${escapeHtml(day.longLabel)}${escapeHtml(period)}限</h3>
          <div class="big-state">
            <span>${escapeHtml(lesson.subject)}</span>
          </div>
          ${lesson.teachers.length
            ? `<div class="compact-note">担当: ${escapeHtml(lesson.teachers.map((teacher) => teacher.name).join(" / "))}</div>`
            : `<div class="compact-note">担当: CSVからは判定できません。</div>`}
          ${lesson.targetLabel ? `<div class="compact-note">対象: ${escapeHtml(lesson.targetLabel)}</div>` : ""}
          ${lesson.teachers.length ? `
            <div class="teacher-nav-buttons">
              ${lesson.teachers.map((teacher) => `
                <button type="button" data-go-teacher-id="${escapeHtml(teacher.id)}" data-go-day-key="${escapeHtml(dayKey)}" data-go-period="${escapeHtml(period)}">
                  ${escapeHtml(teacher.name)}の時間割へ

              `).join("")}
            </div>
          ` : ""}
        </section>
      `;
    }

        ? (currentCommon ? "全員空きです。" : "共通空きではありません。")

      const teacherMode = viewMode === "teacher";
      elements.teacherModeButton.classList.toggle("is-active", teacherMode);
      elements.classModeButton.classList.toggle("is-active", !teacherMode);
      elements.teacherModeButton.setAttribute("aria-selected", String(teacherMode));
      elements.classModeButton.setAttribute("aria-selected", String(!teacherMode));
      elements.teacherSelectedPanel.classList.toggle("hidden", !teacherMode);
      elements.teacherSearchPanel.classList.toggle("hidden", !teacherMode);
      elements.classPanel.classList.toggle("hidden", teacherMode);
      elements.linkChoiceArea.innerHTML = "";
    }

    function renderResults() {
      if (viewMode === "class") {
        if (!appState.teachers.length) {
          elements.resultArea.innerHTML = csvMissingMessageHtml();
          return;
        }
        elements.resultArea.innerHTML = renderClassResult();
        return;
      }

      if (!appState.teachers.length) {
        elements.resultArea.innerHTML = csvMissingMessageHtml();
        return;
      }

      const selected = getSelectedTeachers();
      if (!selected.length) {
        elements.resultArea.innerHTML = `<div class="empty-state">教員を選択してください。</div>`;
        return;
      }

      if (selected.length > 1 && focusedTeacherId) {
        const focusedTeacher = selected.find((teacher) => teacher.id === focusedTeacherId);
        if (focusedTeacher) {
          elements.resultArea.innerHTML = renderSingleTeacherResult(focusedTeacher, { focused: true });
          return;
        }
        focusedTeacherId = "";
      }

      elements.resultArea.innerHTML = selected.length === 1
        ? renderSingleTeacherResult(selected[0])
        : renderMultipleTeacherResult(selected);
    }

    function renderAll() {
      derivedData = buildDerivedData(appState.teachers);
      renderNow();
      renderModeShell();
      renderTimeOffsetOptions();
      renderDisplaySettings();
      renderTeacherSettings();
      renderCacheInfo();
      renderClassList();
      renderTeacherSearch();
      renderSelectedChips();
      renderSelfQuickBlock();
      renderFavoriteList();
      renderDepartmentList();
      renderResults();
    }

    async function importCsvFile() {
      const file = elements.csvFileInput.files?.[0];
      if (!file) {
        showMessage("CSVファイルを選択してください。", "warn");
        return;
      }

      try {
        hideMessage();
        const buffer = await file.arrayBuffer();
        let text = "";
        try {
          text = new TextDecoder("shift-jis", { fatal: true }).decode(buffer);
        } catch (error) {
          throw new Error("Shift_JISデコード失敗。CSVの文字コードを確認してください。");
        }

        const rows = parseCsv(text);
        let teachers = parseTeachersFromRows(rows);
        const settings = normalizeSettings(appState.settings, teachers);
        teachers = normalizeTeachers(teachers, settings);
        appState = {
          version: 1,
          sourceFileName: file.name,
          importedAt: new Date().toISOString(),
          teachers,
          settings
        };
        pruneSelectedTeachers();
        applyMyTeacherDefault();
        saveState();
        showMessage(`${teachers.length}名の教員データを読み込みました。`, "success");
        renderAll();
      } catch (error) {
        showMessage(error.message || "CSV読み込みに失敗しました。", "error");
      }
    }

    function clearCache() {
      localStorage.removeItem(STORAGE_KEY);
      appState = defaultState();
      selectedTeacherIds = [];
      focusedTeacherId = "";
      elements.csvFileInput.value = "";
      hideMessage();
      renderAll();
      showMessage("キャッシュを削除しました。", "success");
    }

    function toggleTeacher(id) {
      if (!appState.teachers.some((teacher) => teacher.id === id)) return;
      if (selectedTeacherIds.includes(id)) {
        selectedTeacherIds = selectedTeacherIds.filter((teacherId) => teacherId !== id);
      } else {
        selectedTeacherIds = [...selectedTeacherIds, id];
      }
      pruneSelectedTeachers();
      renderTeacherSearch();
      renderSelectedChips();
      renderSelfQuickBlock();
      renderFavoriteList();
      renderDepartmentList();
      renderResults();
    }

    function addFavoriteTeacher(id) {
      if (!id || !getTeacherById(id)) return;
      if (!appState.settings.favoriteTeacherIds.includes(id)) {
        appState.settings.favoriteTeacherIds = [...appState.settings.favoriteTeacherIds, id];
        saveState();
      }
      renderTeacherSettings();
      renderTeacherSearch();
      renderSelfQuickBlock();
      renderFavoriteList();
      renderDepartmentList();
    }

    function removeFavoriteTeacher(id) {
      appState.settings.favoriteTeacherIds = appState.settings.favoriteTeacherIds.filter((teacherId) => teacherId !== id);
      saveState();
      renderTeacherSettings();
      renderTeacherSearch();
      renderSelfQuickBlock();
      renderFavoriteList();
      renderDepartmentList();
    }

    function toggleFavoriteTeacher(id) {
      if (appState.settings.favoriteTeacherIds.includes(id)) {
        removeFavoriteTeacher(id);
      } else {
        addFavoriteTeacher(id);
      }
    }

    function setEmploymentOverride(id, type) {
      if (!getTeacherById(id)) return;
      const employmentTypeOverrides = {
        ...appState.settings.employmentTypeOverrides
      };

      if (isValidEmploymentType(type)) {
        employmentTypeOverrides[id] = type;
      } else {
        delete employmentTypeOverrides[id];
      }

      appState.settings.employmentTypeOverrides = employmentTypeOverrides;
      appState.settings = normalizeSettings(appState.settings, appState.teachers);
      appState.teachers = normalizeTeachers(appState.teachers, appState.settings);
      saveState();
      renderAll();
    }

    function clearRouteChoice() {
      elements.linkChoiceArea.innerHTML = "";
    }

    function showClassTargetChooser(classIds, dayKey, period) {
      const uniqueClassIds = uniqueValues(classIds).filter((classId) => CLASS_IDS.includes(classId));
      if (!uniqueClassIds.length) return;
      if (uniqueClassIds.length === 1) {
        goToClassView(uniqueClassIds[0], dayKey, period);
        return;
      }

      elements.linkChoiceArea.innerHTML = `
        <section class="route-choice">
          <h3>表示するクラスを選択</h3>
          <div class="route-buttons">
            ${uniqueClassIds.map((classId) => `
              <button type="button" data-go-class-id="${escapeHtml(classId)}" data-go-day-key="${escapeHtml(dayKey)}" data-go-period="${escapeHtml(period)}">
                ${escapeHtml(classId)}
              </button>
            `).join("")}
          </div>
        </section>
      `;
    }

    function goToClassView(classId, dayKey, period) {
      if (!CLASS_IDS.includes(classId)) return;
      viewMode = "class";
      selectedClassId = classId;
      selectedClassLesson = null;
      focusDayKey = dayKey || "";
      focusPeriod = period ? Number(period) : null;
      clearRouteChoice();
      renderAll();
    }

    function goToTeacherView(teacherId, dayKey, period) {
      if (!getTeacherById(teacherId)) return;
      viewMode = "teacher";
      selectedTeacherIds = [teacherId];
      focusedTeacherId = "";
      focusDayKey = dayKey || "";
      focusPeriod = period ? Number(period) : null;
      selectedClassLesson = null;
      clearRouteChoice();
      renderAll();
    }

    function setViewMode(mode) {
      viewMode = mode === "class" ? "class" : "teacher";
      selectedClassLesson = null;
      focusDayKey = "";
      focusPeriod = null;
      clearRouteChoice();
      renderAll();
    }

    function bindEvents() {
      elements.teacherModeButton.addEventListener("click", () => {
        setViewMode("teacher");
      });

      elements.classModeButton.addEventListener("click", () => {
        setViewMode("class");
      });

      elements.settingsToggle.addEventListener("click", () => {
        const nextOpen = !elements.settingsPanel.classList.contains("is-open");
        setSettingsPanelOpen(nextOpen);
      });

      elements.settingsCloseButton.addEventListener("click", () => {
        setSettingsPanelOpen(false);
      });

      elements.timeOffsetSelect.addEventListener("change", () => {
        appState.settings.timeOffsetMinutes = Number(elements.timeOffsetSelect.value) || 0;
        saveState();
        renderNow();
        renderResults();
      });

      elements.transposeTimetablesCheckbox.addEventListener("change", () => {
        appState.settings.transposeTimetables = elements.transposeTimetablesCheckbox.checked;
        saveState();
        renderResults();
      });

      elements.myTeacherSelect.addEventListener("change", () => {
        appState.settings.myTeacherId = elements.myTeacherSelect.value;
        appState.settings = normalizeSettings(appState.settings, appState.teachers);
        applyMyTeacherDefault({ force: Boolean(appState.settings.myTeacherId) });
        saveState();
        renderAll();
      });

      elements.addFavoriteButton.addEventListener("click", () => {
        addFavoriteTeacher(elements.favoriteTeacherSelect.value);
      });

      elements.employmentTeacherSelect.addEventListener("change", renderTeacherSettings);
      elements.applyEmploymentButton.addEventListener("click", () => {
        setEmploymentOverride(elements.employmentTeacherSelect.value, elements.employmentTypeSelect.value);
      });

      elements.importButton.addEventListener("click", importCsvFile);
      elements.clearCacheButton.addEventListener("click", clearCache);
      elements.teacherSearchInput.addEventListener("input", renderTeacherSearch);
      elements.classSelect.addEventListener("change", () => {
        selectedClassId = elements.classSelect.value || CLASS_IDS[0];
        selectedClassLesson = null;
        focusDayKey = "";
        focusPeriod = null;
        renderAll();
      });
      elements.showAllSelectedButton.addEventListener("click", () => {
        focusedTeacherId = "";
        renderSelectedChips();
        renderResults();
      });
      elements.clearSelectionButton.addEventListener("click", () => {
        selectedTeacherIds = [];
        focusedTeacherId = "";
        renderTeacherSearch();
        renderSelectedChips();
        renderSelfQuickBlock();
        renderFavoriteList();
        renderDepartmentList();
        renderResults();
      });

      document.addEventListener("click", (event) => {
        const classOption = event.target.closest("[data-class-select-id]");
        if (classOption) {
          selectedClassId = classOption.dataset.classSelectId;
          selectedClassLesson = null;
          focusDayKey = "";
          focusPeriod = null;
          renderAll();
          return;
        }

        const classChoiceButton = event.target.closest("[data-go-class-id]");
        if (classChoiceButton) {
          goToClassView(
            classChoiceButton.dataset.goClassId,
            classChoiceButton.dataset.goDayKey,
            classChoiceButton.dataset.goPeriod
          );
          return;
        }

        const teacherNavButton = event.target.closest("[data-go-teacher-id]");
        if (teacherNavButton) {
          goToTeacherView(
            teacherNavButton.dataset.goTeacherId,
            teacherNavButton.dataset.goDayKey,
            teacherNavButton.dataset.goPeriod
          );
          return;
        }

        const classLessonButton = event.target.closest("[data-class-lesson-class]");
        if (classLessonButton) {
          selectedClassLesson = {
            classId: classLessonButton.dataset.classLessonClass,
            dayKey: classLessonButton.dataset.classLessonDay,
            period: Number(classLessonButton.dataset.classLessonPeriod),
            lessonIndex: Number(classLessonButton.dataset.classLessonIndex)
          };
          selectedClassId = selectedClassLesson.classId;
          focusDayKey = selectedClassLesson.dayKey;
          focusPeriod = selectedClassLesson.period;
          renderResults();
          return;
        }

        const classLinkCell = event.target.closest("[data-class-targets]");
        if (classLinkCell) {
          const classIds = classLinkCell.dataset.classTargets.split(",").filter(Boolean);
          showClassTargetChooser(classIds, classLinkCell.dataset.dayKey, classLinkCell.dataset.period);
          return;
        }

        const showAllButton = event.target.closest("[data-show-all-selected]");
        if (showAllButton) {
          focusedTeacherId = "";
          renderSelectedChips();
          renderResults();
          return;
        }

        const focusTeacherButton = event.target.closest("[data-focus-teacher-id]");
        if (focusTeacherButton) {
          focusedTeacherId = focusTeacherButton.dataset.focusTeacherId;
          renderSelectedChips();
          renderResults();
          return;
        }

        const toggleFavoriteButton = event.target.closest("[data-toggle-favorite-id]");
        if (toggleFavoriteButton) {
          toggleFavoriteTeacher(toggleFavoriteButton.dataset.toggleFavoriteId);
          return;
        }

        const removeFavoriteButton = event.target.closest("[data-remove-favorite-id]");
        if (removeFavoriteButton) {
          removeFavoriteTeacher(removeFavoriteButton.dataset.removeFavoriteId);
          return;
        }

        const clearEmploymentButton = event.target.closest("[data-clear-employment-id]");
        if (clearEmploymentButton) {
          setEmploymentOverride(clearEmploymentButton.dataset.clearEmploymentId, "");
          return;
        }

        const departmentToggle = event.target.closest("[data-toggle-department]");
        if (departmentToggle) {
          const department = departmentToggle.dataset.toggleDepartment;
          const willOpen = !expandedDepartments.has(department);
          if (willOpen) {
            expandedDepartments.add(department);
          } else {
            expandedDepartments.delete(department);
          }
          departmentToggle.setAttribute("aria-expanded", String(willOpen));
          const membersId = departmentToggle.getAttribute("aria-controls");
          const members = membersId ? document.getElementById(membersId) : null;
          if (members) members.hidden = !willOpen;
          return;
        }

        const teacherButton = event.target.closest("[data-teacher-id]");
        if (teacherButton) {
          toggleTeacher(teacherButton.dataset.teacherId);
          return;
        }

        const removeButton = event.target.closest("[data-remove-teacher-id]");
        if (removeButton) {
          selectedTeacherIds = selectedTeacherIds.filter((id) => id !== removeButton.dataset.removeTeacherId);
          pruneSelectedTeachers();
          renderTeacherSearch();
          renderSelectedChips();
          renderSelfQuickBlock();
          renderFavoriteList();
          renderDepartmentList();
          renderResults();
        }
      });

      window.addEventListener("storage", (event) => {
        if (event.key !== STORAGE_KEY) return;
        loadState();
        pruneSelectedTeachers();
        applyMyTeacherDefault();
        renderAll();
      });
    }

    function init() {
      loadState();
      pruneSelectedTeachers();
      applyMyTeacherDefault();
      bindEvents();
      renderAll();
      setInterval(() => {
        renderNow();
        renderResults();
      }, 30000);
    }

    init();
  </script>
</body>
</html>
